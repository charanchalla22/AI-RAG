<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG PDF Chatbot</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    display:flex;
    height:100vh;
    background:#f4f6f9;
}

#sidebar{
    width:320px;
    background:#202123;
    color:white;
    padding:15px;
    display:flex;
    flex-direction:column;
}

#newChatBtn{
    width:100%;
    padding:10px;
    background:#10a37f;
    color:white;
    border:none;
    border-radius:5px;
    margin-bottom:15px;
    cursor:pointer;
}

#historyList{
    flex:1;
    overflow-y:auto;
    margin-bottom:20px;
}

.chatItem{
    padding:10px;
    margin-bottom:5px;
    border-radius:5px;
    cursor:pointer;
    background:#2d2f39;
}

.chatItem:hover{
    background:#3d3f49;
}

#chat-container{
    flex:1;
    display:flex;
    flex-direction:column;
}

#messages{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    padding:12px;
    margin:10px;
    border-radius:8px;
    max-width:70%;
    white-space:pre-wrap;
}

.user{
    background:#007bff;
    color:white;
    margin-left:auto;
}

.assistant{
    background:#e9ecef;
    color:black;
}

#input-area{
    display:flex;
    gap:10px;
    padding:15px;
    border-top:1px solid #ccc;
    background:white;
}

input{
    width:100%;
    padding:10px;
}

button{
    padding:10px 15px;
    cursor:pointer;
}

.section{
    margin-bottom:15px;
}

</style>
</head>

<body>

<div id="sidebar">

<button id="newChatBtn" onclick="createNewChat()">
+ New Chat
</button>

<div id="historyList"></div>

<div class="section">
<label>User ID</label>
<input type="text" id="userId" value="user_999">
</div>

<div class="section">
<label>Session ID</label>
<input type="text" id="sessionId" readonly>
</div>

<div class="section">
<label>Upload PDF</label>
<input type="file" id="pdfFile" accept=".pdf">
</div>

<button onclick="uploadDocument()">
Upload PDF
</button>

<br>

<p id="uploadStatus"></p>

</div>

<div id="chat-container">

<div id="messages"></div>

<div id="input-area">

<input
type="text"
id="queryInput"
placeholder="Ask your PDF..."
onkeypress="if(event.key==='Enter') sendMessage()">

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<script>

window.onload = async () => {

    let sessionId =
    localStorage.getItem("session_id");

    if(!sessionId){

        const response =
        await fetch("/new-session");

        const data =
        await response.json();

        sessionId =
        data.session_id;

        localStorage.setItem(
            "session_id",
            sessionId
        );
    }

    document.getElementById(
        "sessionId"
    ).value = sessionId;

    await loadSessions();

    await loadHistory();
};

async function createNewChat(){

    const response =
    await fetch("/new-session");

    const data =
    await response.json();

    localStorage.setItem(
        "session_id",
        data.session_id
    );

    document.getElementById(
        "sessionId"
    ).value =
    data.session_id;

    document.getElementById(
        "messages"
    ).innerHTML="";

    await loadSessions();
}

async function loadSessions(){

    const userId =
    document.getElementById(
        "userId"
    ).value;

    const response =
    await fetch(
        `/sessions/${userId}`
    );

    if(!response.ok) return;

    const sessions =
    await response.json();

    const historyDiv =
    document.getElementById(
        "historyList"
    );

    historyDiv.innerHTML="";

    sessions.forEach(chat=>{

        const div =
        document.createElement("div");

        div.className =
        "chatItem";

        div.innerText =
        chat.title;

        div.onclick = () =>
        openSession(
            chat.session_id
        );

        historyDiv.appendChild(div);
    });
}

async function openSession(id){

    localStorage.setItem(
        "session_id",
        id
    );

    document.getElementById(
        "sessionId"
    ).value=id;

    const response =
    await fetch(
        `/history/${id}`
    );

    const history =
    await response.json();

    document.getElementById(
        "messages"
    ).innerHTML="";

    history.forEach(msg=>{

        appendMessage(
            msg.content,
            msg.role
        );
    });
}

async function uploadDocument(){

    const fileInput =
    document.getElementById(
        "pdfFile"
    );

    const userId =
    document.getElementById(
        "userId"
    ).value;

    const status =
    document.getElementById(
        "uploadStatus"
    );

    if(!fileInput.files[0]){
        alert("Select PDF");
        return;
    }

    const formData =
    new FormData();

    formData.append(
        "file",
        fileInput.files[0]
    );

    formData.append(
        "user_id",
        userId
    );

    status.innerText =
    "Uploading...";

    const response =
    await fetch(
        "/upload",
        {
            method:"POST",
            body:formData
        }
    );

    const data =
    await response.json();

    status.innerText =
    data.message ||
    data.detail;
}

async function sendMessage(){

    const text =
    document.getElementById(
        "queryInput"
    ).value.trim();

    if(!text) return;

    const userId =
    document.getElementById(
        "userId"
    ).value;

    const sessionId =
    document.getElementById(
        "sessionId"
    ).value;

    appendMessage(
        text,
        "user"
    );

    document.getElementById(
        "queryInput"
    ).value="";

    const formData =
    new FormData();

    formData.append(
        "message",
        text
    );

    formData.append(
        "user_id",
        userId
    );

    formData.append(
        "session_id",
        sessionId
    );

    const response =
    await fetch(
        "/chat",
        {
            method:"POST",
            body:formData
        }
    );

    const data =
    await response.json();

    if(response.ok){

        appendMessage(
            data.response,
            "assistant"
        );

        loadSessions();

    }else{

        appendMessage(
            data.detail,
            "assistant"
        );
    }
}

async function loadHistory(){

    const sessionId =
    document.getElementById(
        "sessionId"
    ).value;

    const response =
    await fetch(
        `/history/${sessionId}`
    );

    if(!response.ok)
        return;

    const history =
    await response.json();

    document.getElementById(
        "messages"
    ).innerHTML="";

    history.forEach(msg=>{

        appendMessage(
            msg.content,
            msg.role
        );
    });
}

function appendMessage(
    text,
    sender
){

    const messages =
    document.getElementById(
        "messages"
    );

    const div =
    document.createElement(
        "div"
    );

    div.className =
    `message ${sender}`;

    div.innerText =
    text;

    messages.appendChild(
        div
    );

    messages.scrollTop =
    messages.scrollHeight;
}

</script>

</body>
</html>
