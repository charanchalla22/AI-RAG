<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PDF Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
      background: #f4f4f4;
    }

    /* Sidebar */
    .sidebar {
      width: 25%;
      background: #1e1e2f;
      color: white;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    .sidebar h2, .sidebar h3 {
      margin-top: 0;
    }

    input, button {
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      cursor: pointer;
      background: #4CAF50;
      color: white;
    }

    button:hover {
      background: #45a049;
    }

    /* Style for the secondary action button */
    .btn-secondary {
      background: #2196F3;
      margin-bottom: 15px;
    }
    .btn-secondary:hover {
      background: #0b7dda;
    }

    /* Session List Container */
    .session-list-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      margin-top: 15px;
    }

    .session-item {
      padding: 12px;
      background: #2d2d44;
      margin-bottom: 8px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 14px;
    }

    .session-item:hover {
      background: #3d3d5c;
    }

    .session-item.active {
      background: #4CAF50;
      font-weight: bold;
    }

    /* Chat area */
    .chat-container {
      width: 75%;
      display: flex;
      flex-direction: column;
    }

    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #d1e7ff;
      align-self: flex-end;
    }

    .ai {
      background: #e2e2e2;
      align-self: flex-start;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: white;
    }

    .input-box input {
      flex: 1;
      margin-right: 10px;
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Upload PDF</h2>

    <input type="file" id="pdfFile" />
    <button onclick="uploadPDF()">Upload</button>

    <hr style="width: 100%; margin-top: 20px; border-color: #3d3d5c;" />

    <button onclick="createNewSession()" class="btn-secondary">+ New Chat</button>
    
    <h3>Recent Chats</h3>
    <div class="session-list-container" id="sessionList">
      <!-- Dynamic session items appear here -->
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-container">
    <div class="messages" id="messages"></div>

    <div class="input-box">
      <input type="text" id="messageInput" placeholder="Type your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

<script>
const HOST = "http://127.0.0.1:8000";
const messagesDiv = document.getElementById("messages");
const sessionListDiv = document.getElementById("sessionList");

const USER_ID = "1";
let currentSessionId = "";
let sessions = ["34"]; 

// Initialize app with initial session
window.onload = function() {
  renderSessions();
  switchSession("34");
};

// Generates a unique room session and updates active lists
function createNewSession() {
  const newId = Math.floor(1000 + Math.random() * 9000).toString();
  sessions.unshift(newId); 
  renderSessions();
  switchSession(newId);
}

// Rebuilds the visual HTML list inside the sidebar layout without showing the raw IDs
function renderSessions() {
  sessionListDiv.innerHTML = "";
  sessions.forEach(id => {
    const item = document.createElement("div");
    item.classList.add("session-item");
    item.setAttribute("data-id", id); // Store ID safely as a data attribute instead of plain text
    
    if (id === currentSessionId) item.classList.add("active");
    
    item.innerText = `Chat Session`;
    item.onclick = () => switchSession(id);
    sessionListDiv.appendChild(item);
  });
}

// Switches tracking states and automatically calls API backend log history data
async function switchSession(id) {
  currentSessionId = id;
  
  // Update UI visual active state classes using the data attributes
  const items = document.querySelectorAll('.session-item');
  items.forEach(item => {
    item.classList.remove('active');
    if (item.getAttribute("data-id") === id) item.classList.add('active');
  });

  messagesDiv.innerHTML = ""; 

  // API Call to pull targeted context history records
  try {
    const res = await fetch(`${HOST}/history?session_id=${currentSessionId}`);
    const data = await res.json();
    if (data.history) {
      data.history.forEach(msg => {
        addMessage(msg.role, msg.content);
      });
    }
  } catch (error) {
    console.error("Could not fetch old messages:", error);
  }
}

function addMessage(role, text) {
  const div = document.createElement("div");
  div.classList.add("msg", role);
  div.innerText = text;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

/* Upload PDF */
async function uploadPDF() {
  const file = document.getElementById("pdfFile").files[0];
  if (!file) return alert("Select a PDF first");

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch(`${HOST}/upload`, {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  alert(data.message || data.detail);
}

/* Send message */
async function sendMessage() {
  const message = document.getElementById("messageInput").value;

  if (!message) return;

  addMessage("user", message);
  document.getElementById("messageInput").value = "";

  const formData = new FormData();
  formData.append("message", message);
  formData.append("user_id", USER_ID);
  formData.append("session_id", currentSessionId);

  const res = await fetch(`${HOST}/chat`, {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  addMessage("ai", data.response);
}
</script>

</body>
</html>
