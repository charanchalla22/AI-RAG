<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF RAG Chatbot</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:900px;
    height:90vh;
    background:white;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    display:flex;
    flex-direction:column;
}

.header{
    background:#2563eb;
    color:white;
    padding:15px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.upload-section{
    padding:15px;
    border-bottom:1px solid #ddd;
    display:flex;
    gap:10px;
}

.upload-section input{
    flex:1;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1e4ed8;
}

#status{
    padding:10px;
    color:green;
    font-weight:bold;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:15px;
    background:#f9fafb;
}

.message{
    margin:10px;
    padding:12px 16px;
    border-radius:12px;
    max-width:85%;
    line-height:1.6;
    word-wrap:break-word;
    overflow-wrap:break-word;
    white-space:pre-wrap;
}

.user{
    background:#dbeafe;
    margin-left:auto;
    text-align:left;
}

.bot{
    background:#f3f4f6;
    margin-right:auto;
    text-align:left;
    max-width:95%;
}

.bot h1,
.bot h2,
.bot h3,
.bot h4{
    margin-top:10px;
    margin-bottom:8px;
}

.bot ul,
.bot ol{
    padding-left:25px;
}

.bot p{
    margin-bottom:8px;
}

.user{
    background:#dbeafe;
    margin-left:auto;
}

.bot{
    background:#e5e7eb;
}

.chat-input{
    display:flex;
    padding:15px;
    border-top:1px solid #ddd;
}

.chat-input input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

.chat-input button{
    margin-left:10px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        PDF RAG Chatbot
    </div>

    <div class="upload-section">
        <input type="file" id="pdfFile" accept=".pdf">
        <button onclick="uploadPDF()">Upload PDF</button>
    </div>

    <div id="status"></div>

    <div id="chatBox" class="chat-box"></div>

    <div class="chat-input">
        <input type="text" id="question" placeholder="Ask a question...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

const API_URL = "http://127.0.0.1:8000";

async function uploadPDF() {

    const fileInput = document.getElementById("pdfFile");

    if(fileInput.files.length === 0){
        alert("Please select a PDF.");
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try{

        document.getElementById("status").innerText =
        "Uploading and processing PDF...";

        const response = await fetch(
            `${API_URL}/upload`,
            {
                method:"POST",
                body:formData
            }
        );

        const data = await response.json();

        document.getElementById("status").innerText =
        data.message;

    }
    catch(error){

        document.getElementById("status").innerText =
        "Upload failed.";

        console.error(error);
    }
}

function addMessage(text, type){

    const chatBox = document.getElementById("chatBox");

    const div = document.createElement("div");
    div.classList.add("message");
    div.classList.add(type);

    div.innerHTML = text;

    chatBox.appendChild(div);

    chatBox.scrollTop = chatBox.scrollHeight;
}




async function sendMessage(){

    const input = document.getElementById("question");

    const question = input.value.trim();

    if(question === ""){
        return;
    }

    addMessage("<b>You:</b> " + question, "user");

    input.value = "";

    const formData = new FormData();
    formData.append("message", question);

    try{

        const response = await fetch(
            `${API_URL}/chat`,
            {
                method:"POST",
                body:formData
            }
        );

        const data = await response.json();

        addMessage(
            "<b>Bot:</b> " + data.response,
            "bot"
        );

    }
    catch(error){

        addMessage(
            "<b>Bot:</b> Server error.",
            "bot"
        );

        console.error(error);
    }
}

document.getElementById("question")
.addEventListener("keypress", function(event){

    if(event.key === "Enter"){
        sendMessage();
    }

});

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
