services:
  db:
    image: postgres:15-alpine
    container_name: rag_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: charan
      POSTGRES_DB: rag_database
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: rag_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ragapp.com
      PGADMIN_DEFAULT_PASSWORD: charan
    ports:
      - "5050:80"
    depends_on:
      - db

  web:
    build: .
    container_name: rag_backend_app
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  pgdata:
    driver: local
